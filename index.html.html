
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
#app { display: flex; height: 600px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; background: var(--color-background-primary); }
#sidebar { width: 220px; border-right: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); display: flex; flex-direction: column; flex-shrink: 0; }
#sidebar-header { padding: 14px 14px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); }
#sidebar-header .lib-name { font-size: 12px; font-weight: 500; color: var(--color-text-primary); line-height: 1.4; }
#sidebar-header .lib-sub { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
#topic-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.topic-btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 7px 14px; font-size: 12px; color: var(--color-text-secondary); background: none; border: none; cursor: pointer; text-align: left; border-radius: 0; transition: background 0.15s; }
.topic-btn:hover { background: var(--color-background-primary); color: var(--color-text-primary); }
.topic-btn.active { background: var(--color-background-primary); color: var(--color-text-primary); font-weight: 500; }
.topic-btn i { font-size: 15px; flex-shrink: 0; color: #185FA5; }
#chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
#chat-header { padding: 12px 16px; border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; gap: 10px; }
#chat-header .avatar { width: 32px; height: 32px; border-radius: 50%; background: #E6F1FB; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
#chat-header .avatar i { font-size: 17px; color: #185FA5; }
#chat-header .title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
#chat-header .subtitle { font-size: 12px; color: var(--color-text-secondary); }
#chat-header .status { margin-left: auto; display: flex; align-items: center; gap: 5px; font-size: 11px; color: #1D9E75; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: #1D9E75; }
#messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.msg { display: flex; gap: 8px; align-items: flex-start; }
.msg.user { flex-direction: row-reverse; }
.msg-bubble { max-width: 80%; padding: 9px 13px; border-radius: var(--border-radius-lg); font-size: 13px; line-height: 1.6; }
.msg.bot .msg-bubble { background: var(--color-background-secondary); color: var(--color-text-primary); border: 0.5px solid var(--color-border-tertiary); border-bottom-left-radius: 4px; }
.msg.user .msg-bubble { background: #185FA5; color: #fff; border-bottom-right-radius: 4px; }
.msg-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; }
.bot-av { background: #E6F1FB; color: #185FA5; }
.user-av { background: #185FA5; color: #fff; }
.msg-bubble a { color: #185FA5; text-decoration: underline; font-size: 12px; }
.msg.user .msg-bubble a { color: #B5D4F4; }
.msg-bubble .chip-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); font-size: 11px; color: var(--color-text-secondary); background: var(--color-background-primary); cursor: pointer; transition: background 0.15s; }
.chip:hover { background: #E6F1FB; color: #185FA5; border-color: #B5D4F4; }
.typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--color-text-secondary); animation: blink 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
#input-area { padding: 12px 16px; border-top: 0.5px solid var(--color-border-tertiary); display: flex; gap: 8px; align-items: center; }
#user-input { flex: 1; padding: 9px 12px; font-size: 13px; border: 0.5px solid var(--color-border-secondary); border-radius: 20px; background: var(--color-background-secondary); color: var(--color-text-primary); outline: none; font-family: var(--font-sans); }
#user-input:focus { border-color: #185FA5; background: var(--color-background-primary); }
#send-btn { width: 34px; height: 34px; border-radius: 50%; background: #185FA5; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
#send-btn:hover { background: #0C447C; }
#send-btn i { font-size: 16px; }
.section-label { font-size: 10px; font-weight: 500; color: var(--color-text-secondary); padding: 8px 14px 4px; text-transform: uppercase; letter-spacing: 0.5px; }
</style>

<h2 class="sr-only">MD Library AI Chatbot Agent — ask about library resources, video lectures, e-journals, and more</h2>

<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="lib-name">MD Library</div>
      <div class="lib-sub">Mahamahopadhyay Dhireswaracharya</div>
    </div>
    <div id="topic-list">
      <div class="section-label">Quick topics</div>
      <button class="topic-btn" onclick="quickAsk('What resources are available in this library?')"><i class="ti ti-building-library" aria-hidden="true"></i> All resources</button>
      <button class="topic-btn" onclick="quickAsk('Show me video lectures available')"><i class="ti ti-video" aria-hidden="true"></i> Video lectures</button>
      <button class="topic-btn" onclick="quickAsk('What e-journals and e-resources are available?')"><i class="ti ti-files" aria-hidden="true"></i> E-resources</button>
      <button class="topic-btn" onclick="quickAsk('Show me study materials')"><i class="ti ti-book" aria-hidden="true"></i> Study materials</button>
      <button class="topic-btn" onclick="quickAsk('How do I access the institutional repository?')"><i class="ti ti-database" aria-hidden="true"></i> Repository</button>
      <button class="topic-btn" onclick="quickAsk('Tell me about question papers and syllabus')"><i class="ti ti-file-text" aria-hidden="true"></i> Question papers</button>
      <button class="topic-btn" onclick="quickAsk('What career guidance resources are available?')"><i class="ti ti-briefcase" aria-hidden="true"></i> Career guidance</button>
      <button class="topic-btn" onclick="quickAsk('Tell me about ONOS - One Nation One Subscription')"><i class="ti ti-globe" aria-hidden="true"></i> ONOS</button>
      <button class="topic-btn" onclick="quickAsk('What MOOC courses are available?')"><i class="ti ti-school" aria-hidden="true"></i> MOOCs</button>
      <button class="topic-btn" onclick="quickAsk('Tell me about the manuscript section catalogue')"><i class="ti ti-scroll" aria-hidden="true"></i> Manuscripts</button>
      <button class="topic-btn" onclick="quickAsk('How do I apply for library membership?')"><i class="ti ti-user-plus" aria-hidden="true"></i> Membership</button>
      <button class="topic-btn" onclick="quickAsk('What are the library rules and contact information?')"><i class="ti ti-info-circle" aria-hidden="true"></i> Library info</button>
    </div>
  </div>
  <div id="chat-area">
    <div id="chat-header">
      <div class="avatar"><i class="ti ti-robot" aria-hidden="true"></i></div>
      <div>
        <div class="title">Library Assistant</div>
        <div class="subtitle">sites.google.com/view/mdlibrary</div>
      </div>
      <div class="status"><div class="status-dot"></div> Online</div>
    </div>
    <div id="messages"></div>
    <div id="input-area">
      <input id="user-input" type="text" placeholder="Ask about resources, lectures, journals…" />
      <button id="send-btn" aria-label="Send"><i class="ti ti-send" aria-hidden="true"></i></button>
    </div>
  </div>
</div>

<script>
const LIBRARY_URL = "https://sites.google.com/view/mdlibrary";

const SYSTEM_PROMPT = `You are an AI library assistant for the Mahamahopadhyay Dhireswaracharya Library (MD Library) at Kumar Bhaskar Varma Sanskrit and Ancient Studies University (KBVSASUN), Nalbari, Assam, India. The library website is at https://sites.google.com/view/mdlibrary

You help students and researchers find and access all library resources. Always be helpful, concise, and provide direct links when possible.

LIBRARY RESOURCES AND LINKS:

1. HOME & ABOUT
- Library collection and users: https://sites.google.com/view/mdlibrary/home/library-collection-and-users
- About Kumar Bhaskar Varma: https://sites.google.com/view/mdlibrary/home/about-kumar-bhaskar-varma
- About Mahamahopadhyay Dhireswaracharya: https://sites.google.com/view/mdlibrary/home/about-mahamahopadhyay-dhireswarachary

2. VIDEO LECTURES
- MA Political Science – 1st Semester: https://sites.google.com/view/mdlibrary/video-lectures/ma-political-science/1st-semester
- MA Political Science – 2nd Semester: https://sites.google.com/view/mdlibrary/video-lectures/ma-political-science/2nd-semester
- MA Political Science – 4th Semester: https://sites.google.com/view/mdlibrary/video-lectures/ma-political-science/4th-semester
- MA Education – 1st Semester: https://sites.google.com/view/mdlibrary/video-lectures/ma-education/ma-1st-sem
- MA Education – 2nd Semester: https://sites.google.com/view/mdlibrary/video-lectures/ma-education/ma-2nd-sem
- MA Education – 4th Semester: https://sites.google.com/view/mdlibrary/video-lectures/ma-education/ma-4th-sem
- Sanskrit Sahitya Lectures: https://sites.google.com/view/mdlibrary/video-lectures/sanaskrit-sahitya

3. INSTITUTIONAL REPOSITORY
- Digital Library / Institutional Repository: http://kbvsasun.digitallibrary.co.in

4. STUDY MATERIALS
- LLM Study Materials: https://sites.google.com/view/mdlibrary/study-materials/llm
- Sanskrit Manuscript Resources: https://sites.google.com/view/mdlibrary/study-materials/sanskrit-mansucript-resources
- Sanskrit Sahitya Study Materials: https://sites.google.com/view/mdlibrary/study-materials/sanskrit-sahitya

5. E-RESOURCES
- Periodicals: https://sites.google.com/view/mdlibrary/httpnoprniscairresinhandle12345678910290/periodicals
- E-Journals (English): https://sites.google.com/view/mdlibrary/httpnoprniscairresinhandle12345678910290/e-journals/english
- E-Journals (Political Science): https://sites.google.com/view/mdlibrary/httpnoprniscairresinhandle12345678910290/e-journals/political-science
- E-Journals (Sanskrit Studies): https://sites.google.com/view/mdlibrary/httpnoprniscairresinhandle12345678910290/e-journals/sanskrit-studies
- E-Journals (Education): https://sites.google.com/view/mdlibrary/httpnoprniscairresinhandle12345678910290/e-journals/education
- Newspaper Clipping Service: https://sites.google.com/view/mdlibrary/httpnoprniscairresinhandle12345678910290/e-journals/newspaper-clipping-service
- E-Newspapers & Magazines: https://sites.google.com/view/mdlibrary/httpnoprniscairresinhandle12345678910290/current-news

6. MANUSCRIPT SECTION
- Manuscript Section Catalogue: https://sites.google.com/view/mdlibrary/manuscript-section-catalogue

7. PhD THESIS
- PhD Theses awarded from University: https://sites.google.com/view/mdlibrary/phd-thesis-awarded-from-university

8. ONOS (One Nation One Subscription)
- ONOS Access Portal (IDP login): https://idp.kbvsasun.ac.in/
- ONOS page: https://sites.google.com/view/mdlibrary home

9. CAREER GUIDANCE
- Career News: https://sites.google.com/view/mdlibrary/assignments/career-news
- Career Schemes / Vidya Lakshmi Portal: https://sites.google.com/view/mdlibrary/assignments/vidya-lakshmi-portal
- Career-oriented Resources: https://sites.google.com/view/mdlibrary/assignments/carrer-oriented-resources
- Sanskrit Studies as Career: https://sites.google.com/view/mdlibrary/assignments/sanskrit-studies-as-career
- UGC NET (Education): https://sites.google.com/view/mdlibrary/assignments/ugc-net/education

10. SYLLABUS
- Syllabus: https://sites.google.com/view/mdlibrary/syllabus

11. QUESTION PAPERS
- PhD Course Work Question Papers: https://sites.google.com/view/mdlibrary/question-papers/phd-course-work
- PG Question Papers: https://sites.google.com/view/mdlibrary/question-papers/pg-question-paper

12. WOMEN EMPOWERMENT
- Women Empowerment Resources: https://sites.google.com/view/mdlibrary/women-empowerment

13. MOOCs
- MOOC Courses: https://sites.google.com/view/mdlibrary/moocs

14. LIBRARIAN'S DESK
- Library 2.0 Initiatives: https://sites.google.com/view/mdlibrary/librarian-s-desk/library-2-0-initiatives
- Library Committee: https://sites.google.com/view/mdlibrary/librarian-s-desk/extra-credit
- Contact Us: https://sites.google.com/view/mdlibrary/librarian-s-desk/contact-us
- Library Rules: https://sites.google.com/view/mdlibrary/librarian-s-desk/contact-me

15. OTHER SERVICES
- Book Recommendation: https://sites.google.com/view/mdlibrary/book-recomendation
- Membership Form: https://sites.google.com/view/mdlibrary/my-forms

INSTRUCTIONS:
- When answering, always include the relevant clickable link(s) for the resources mentioned.
- Format your responses clearly with resource names and links.
- For subject-specific queries (Sanskrit, Political Science, Education), point to the relevant sub-sections.
- If a student asks about a topic you don't have specific info on, guide them to the main library website.
- Keep responses concise (3-6 sentences) unless a detailed list is needed.
- You can answer in English, Hindi, Assamese, or Sanskrit based on what the user writes.
- For the institutional repository, the URL is http://kbvsasun.digitallibrary.co.in`;

const conversationHistory = [];
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');

function renderMessage(role, text, isHTML=false) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const av = document.createElement('div');
  av.className = `msg-avatar ${role === 'bot' ? 'bot-av' : 'user-av'}`;
  av.innerHTML = role === 'bot' ? '<i class="ti ti-robot" aria-hidden="true"></i>' : '<i class="ti ti-user" aria-hidden="true"></i>';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (isHTML) bubble.innerHTML = text;
  else bubble.textContent = text;
  div.appendChild(av);
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return bubble;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing-indicator';
  div.innerHTML = '<div class="msg-avatar bot-av"><i class="ti ti-robot" aria-hidden="true"></i></div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function formatBotResponse(text) {
  let html = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/(https?:\/\/[^\s\)\,]+)/g, '<a href="$1" target="_blank">$1</a>')
    .replace(/\n/g, '<br>');
  return html;
}

async function sendMessage(userText) {
  if (!userText.trim()) return;
  inputEl.value = '';
  renderMessage('user', userText);
  conversationHistory.push({ role: 'user', content: userText });
  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });
    const data = await response.json();
    const reply = data.content.map(b => b.text || '').join('');
    conversationHistory.push({ role: 'assistant', content: reply });
    hideTyping();
    renderMessage('bot', formatBotResponse(reply), true);
  } catch(e) {
    hideTyping();
    renderMessage('bot', 'Sorry, I encountered an error. Please try again or visit the library website directly at ' + LIBRARY_URL, false);
  }
}

function quickAsk(q) {
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  sendMessage(q);
}

document.getElementById('send-btn').onclick = () => sendMessage(inputEl.value);
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(inputEl.value); });

const welcomeHTML = `Welcome! I'm your <strong>MD Library Assistant</strong> 📚<br><br>
I can help you access all resources from <a href="https://sites.google.com/view/mdlibrary" target="_blank">Mahamahopadhyay Dhireswaracharya Library</a> — video lectures, e-journals, study materials, question papers, career guidance, and more.<br><br>
What are you looking for today?
<div class="chip-row">
  <span class="chip" onclick="sendMessage('Show me video lectures for MA Political Science')"><i class="ti ti-video" aria-hidden="true"></i> MA Pol. Science</span>
  <span class="chip" onclick="sendMessage('What Sanskrit study materials are available?')"><i class="ti ti-book" aria-hidden="true"></i> Sanskrit</span>
  <span class="chip" onclick="sendMessage('Show MA Education resources')"><i class="ti ti-school" aria-hidden="true"></i> MA Education</span>
  <span class="chip" onclick="sendMessage('How to access ONOS journals?')"><i class="ti ti-globe" aria-hidden="true"></i> ONOS</span>
</div>`;
renderMessage('bot', welcomeHTML, true);
</script>
